# /etc/nginx/sites-available/gomi-maru.com
# シンボリックリンク: sudo ln -s /etc/nginx/sites-available/gomi-maru.com /etc/nginx/sites-enabled/
#
# 既存の gomi-maru.com サーバーブロックに /chiseki location を追加する構成。
# すでに server { ... } ブロックがある場合は、その中に location 部分だけをコピーしてください。

server {
    listen 80;
    server_name gomi-maru.com www.gomi-maru.com;

    # HTTPへのアクセスはHTTPSへリダイレクト（certbotが自動追記する場合もあり）
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name gomi-maru.com www.gomi-maru.com;

    # SSL証明書（certbot実行後に自動設定される）
    # ssl_certificate /etc/letsencrypt/live/gomi-maru.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/gomi-maru.com/privkey.pem;

    # アップロードサイズ上限（DXFは大きい場合があるので余裕を持たせる）
    client_max_body_size 100M;

    # ルートや他のパスは既存設定を維持
    # location / { ... }

    # Chiseki Webアプリ
    location /chiseki/ {
        proxy_pass http://127.0.0.1:8501/chiseki/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streamlit は WebSocket を使うので必須
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 長時間処理対応
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Streamlit の静的アセット用
    location /chiseki/_stcore/ {
        proxy_pass http://127.0.0.1:8501/chiseki/_stcore/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
